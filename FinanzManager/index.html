<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanz Manager</title>
    <link rel="stylesheet" href="style.css">
    
    
</head>
<body>
    <h1>Finanz Manager</h1>

    <article class="subtitle">
        <h2>Wähle zwischen Schuldeneinträgen oder eigenen Finanzen.</h2>       
    </article>

    <section class="app-container grid">
        <div class="app" onclick="openDebts()">
            <h3>Schuldenbuch</h3><img src="/bilder/applogo.png" alt="Link zu der Schuldner Seite">
            
        </div>

        <div class="app" onclick="openFinances()">
            <h3>Finanzen</h3>
            <img src="bilder/finances.png" alt="Link zu der Finanzen Seite">
            
        </div>


    </section>


    <section id="SchuldenSection" class="app-container grid hidden">
        <div class="view-header">
            <img src="bilder/applogo.png" alt="Logo mit Link zur Startseite">
            <h3>Schuldenbuch</h3>
            <button class="btn-primary" id="add-person-btn" type="submit">Person hinzufügen</button>
        </div>

        <div class="app" id="Schulden-Container">

        </div>
    </section>


    <section id="FinanzSection" class="app-container grid hidden">
        <div class="view-header">
            <img src="bilder/finances.png" alt="Logo mit Link zu den Finanzen">
            <h3>Finanzen</h3>
            <button class="btn-primary" id="add-finance-btn" type="submit">Schuld hinzufügen</button>
        </div>

        <div class="app" id="Finanzen-Container">
            
        </div>
    </section>

</body>
</html>
