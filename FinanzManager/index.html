<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanz Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Finanz Manager</h1>
    <img class="logo" src="bilder/applogo.png" alt="Logo der App">

    <article class="subtitle">
        <h2>Wähle zwischen Schuldeneinträgen oder eigenen Finanzen.</h2>       
    </article>

    <section class="app-container grid">
        <div class="app" onclick="openDebts()">
            <h3>Schuldenbuch</h3>
            <img  src="bilder/Schulden-Logo.png" alt="Link zu der Schuldner Seite">
        </div>

        <div class="app" onclick="openFinances()">
            <h3>Finanzen</h3>
            <img  src="bilder/DauerRate-Logo.png"alt="Link zu der Finanzen Seite">
        </div>
    </section>


    <section id="SchuldenSection" class="app-container  hidden">
        <div class="view-header">
            <img src="bilder/applogo.png" onclick="openDashboard()" alt="Logo mit Link zur Startseite">
            <h3>Schuldenbuch</h3>
            <button class="btn-primary" id="add-person-btn" type="button" onclick="openModal('AddPersonModal')">Person hinzufügen</button>
        </div>

        <div id="Schulden-Container" class="grid">

        </div>
    </section>


    <section id="SchuldenDetailSection" class="app-container  hidden">
        <div class="view-header">
            
            <img src="bilder/applogo.png" onclick="openDashboard()" alt="Direkt zum Dashboard">
            <h3 id="CurrentPersonName">Schulden von ...</h3>
            <button class="btn-primary" id="add-entry-btn" type="button" onclick="openModal('AddEntryModal')">Schuld hinzufügen</button>
            <button class="btn-primary" onclick="openDebts()">&larr; Zurück</button>
        </div>

        <div id="Personen-Schulden-Container" class="grid">

        </div>
    </section>


    <section id="FinanzSection" class="app-container grid hidden">
        <div class="view-header">
            <img src="bilder/applogo.png" onclick="openDashboard()" alt="Logo mit Link zu den Finanzen">
            <h3>Finanzen</h3>
            <button class="btn-primary" id="add-finance-btn" type="submit">Schuld hinzufügen</button>
        </div>

        <div id="Finanzen-Container">
            
        </div>
    </section>

    <div id="AddPersonModal" class="modal hidden">
        <div class="modal-content">
            <h3>Neue Person hinzufügen</h3>
            <form id="add-person-form" onsubmit="savePerson(event)">
                <div class="form-group">
                    <label for="person-name">Name der Person:</label>
                    <input type="text" id="person-name" required placeholder="z.B. Max Mustermann">
                    <label for="street">Straße und Hausnummer:</label>
                    <input type="text" id="street" required placeholder="z.B. Musterstraße 1">
                    
                    <label for="ZipCode">Postleitzahl:</label>
                    <input type="text" id="ZipCode" required placeholder="z.B. 12345">
                    <label for="city">Stadt:</label>
                    <input type="text" id="city" required placeholder="z.B. Musterstadt">
                </div>
                <div class="modal-buttons">
                    <button type="button" class="btn-primary" onclick="closeModal('AddPersonModal')">Abbrechen</button>
                    <button type="submit" class="btn-primary">Speichern</button>
                </div>
            </form>
        </div>
    </div>

    <div id="AddEntryModal" class="modal hidden">
        <div class="modal-content">
            <h3 id="EntryModalTitle">Neuen Eintrag hinzufügen</h3>
            <form id="add-entry-form" onsubmit="saveEntry(event)">
                <div class="form-group">
                    <label for="entry-purpose">Verwendungszweck:</label>
                    <input type="text" id="entry-purpose" required placeholder="z.B. Kasten Bier, Monatsbeitrag">
                </div>
                <div class="form-group">
                    <label for="entry-amount">Betrag in €:</label>
                    <input type="number" id="entry-amount" step="0.01" required placeholder="0,00">
                </div>
                <div class="modal-buttons">
                    <button type="button" class="btn-primary" onclick="closeModal('AddEntryModal')">Abbrechen</button>
                    <button type="submit" class="btn-primary">Speichern</button>
                </div>
            </form>
        </div>
    </div>

    <div id="UpdateDebtModal" class="modal hidden">
        <div class="modal-content">
            <h3 id="EntryModalTitle">Schuld bearbeiten</h3>
            <form id="update-entry-form" onsubmit="updateDebt(event)">
                <div class="form-group">
                    <label for="update-debt-id">Schuld-ID:</label>
                    <input type="text" id="update-debt-id" readonly>
                </div>
                <div class="form-group">
                    <label for="update-debt-amount">Differenz eingeben:</label>
                    <input type="number" id="update-debt-amount" step="0.01" required placeholder="5,00 oder -5,00">
                </div>
                <div class="modal-buttons">
                    <button type="button" class="btn-primary" onclick="closeModal('UpdateDebtModal')">Abbrechen</button>
                    <button type="submit" class="btn-primary">Speichern</button>
                </div>
            </form>
        </div>
    </div>
                    

<script src="script.js"></script>

</body>
</html>
